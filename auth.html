<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - DeepSea Sentinel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode:"class",
  theme:{ extend:{
    colors:{"primary-container":"#0ea5e9","surface-tint":"#89ceff","surface":"#0b1326","surface-container-highest":"#2d3449","on-primary":"#00344d","secondary":"#4fdbc8","surface-container":"#171f33","on-surface":"#dae2fd","surface-dim":"#0b1326","outline-variant":"#3e4850","tertiary":"#3cddc7","surface-container-low":"#131b2e","on-background":"#dae2fd","primary":"#89ceff","secondary-container":"#04b4a2","error":"#ffb4ab","outline":"#88929b","on-secondary":"#003731","surface-container-high":"#222a3d","surface-container-lowest":"#060e20","background":"#0b1326","on-primary-fixed":"#001e2f","tertiary-container":"#00af9d"},
    fontFamily:{"mono-label":["Space Grotesk"],"body-md":["Inter"],"grade-display":["Space Grotesk"],"h1":["Inter"],"h2":["Inter"],"h3":["Inter"],"mono-data":["Space Grotesk"]},
    fontSize:{"mono-label":["14px",{"lineHeight":"1.4","letterSpacing":"0.05em","fontWeight":"500"}],"body-md":["16px",{"lineHeight":"1.6","fontWeight":"400"}],"grade-display":["48px",{"lineHeight":"1","fontWeight":"700"}],"h1":["40px",{"lineHeight":"1.2","letterSpacing":"-0.02em","fontWeight":"700"}],"h2":["32px",{"lineHeight":"1.2","fontWeight":"600"}],"h3":["24px",{"lineHeight":"1.3","fontWeight":"600"}],"mono-data":["12px",{"lineHeight":"1.4","fontWeight":"400"}]}
  }}
}
</script>
<style>
.glass-card{background:linear-gradient(180deg,rgba(255,255,255,.1)0%,rgba(255,255,255,.02)100%);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1)}
.ocean-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(14,165,233,.15)0%,transparent 70%);filter:blur(80px);border-radius:50%}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
</style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-hidden h-screen flex items-center justify-center p-8">
<!-- Background -->
<div class="fixed inset-0 z-0" style="background:radial-gradient(circle at 50% 50%,#0c2b4e 0%,#0b1326 100%)"></div>
<div class="ocean-glow fixed top-[-100px] left-[-100px] z-0"></div>
<div class="ocean-glow fixed bottom-[-100px] right-[-100px] z-0"></div>
<div class="fixed inset-0 pointer-events-none z-0 opacity-20">
  <div class="absolute top-1/4 right-1/4 w-96 h-96 bg-tertiary/20 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[120px]"></div>
</div>

<!-- Main -->
<main class="w-full max-w-lg z-10 relative">
  <!-- Brand -->
  <div class="text-center mb-10">
    <a href="index.html" class="inline-flex items-center justify-center p-4 rounded-xl bg-white/5 border border-white/10 mb-4 shadow-[0_0_20px_rgba(14,165,233,0.3)] hover:bg-white/10 transition-all">
      <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings:'FILL' 1;">security</span>
    </a>
    <h1 class="font-h1 text-h1 text-primary tracking-tighter drop-shadow-[0_0_8px_rgba(14,165,233,0.5)]">DeepSea Sentinel</h1>
    <p class="font-mono-label text-mono-label text-outline uppercase tracking-widest mt-2">Vulnerability Engine Access</p>
  </div>

  <!-- Form Card -->
  <div class="glass-card rounded-xl p-8 shadow-2xl">
    <form id="login-form" class="flex flex-col gap-6">
      <!-- Toggle -->
      <div class="flex justify-between items-center mb-2">
        <h2 id="auth-title" class="font-h2 text-h3 text-on-surface">Sign In</h2>
        <button type="button" id="toggle-auth" class="font-mono-label text-mono-label text-primary hover:text-tertiary transition-colors flex items-center gap-2">
          Create Account <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </div>

      <!-- Inputs -->
      <div class="space-y-4">
        <div class="space-y-2">
          <label class="font-mono-label text-mono-label text-outline flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">alternate_email</span>EMAIL ADDRESS
          </label>
          <input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="operator@deepsea.net" type="email"/>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="font-mono-label text-mono-label text-outline flex items-center gap-2">
              <span class="material-symbols-outlined text-sm">lock</span>PASSWORD
            </label>
            <a class="text-[10px] font-mono-label text-outline hover:text-primary transition-colors" href="#">FORGOT KEY?</a>
          </div>
          <input class="w-full bg-surface-container-lowest border border-white/10 rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="••••••••••••" type="password"/>
        </div>
      </div>

      <!-- Submit -->
      <div class="pt-2">
        <button id="auth-submit" type="submit" class="w-full bg-gradient-to-r from-primary-container to-secondary-container text-on-primary-fixed font-h3 py-4 rounded-lg shadow-[0_0_25px_rgba(14,165,233,0.3)] hover:shadow-[0_0_40px_rgba(14,165,233,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
          <span id="auth-submit-label">INITIALIZE SESSION</span>
          <span class="material-symbols-outlined">login</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-1">
        <div class="h-px bg-white/10 flex-grow"></div>
        <span class="font-mono-label text-[10px] text-outline">SECURE PROTOCOL</span>
        <div class="h-px bg-white/10 flex-grow"></div>
      </div>

      <!-- Secondary -->
      <div class="grid grid-cols-2 gap-4">
        <button type="button" class="flex items-center justify-center gap-2 border border-white/10 rounded-lg py-3 hover:bg-white/5 transition-all">
          <span class="material-symbols-outlined text-on-surface text-lg">terminal</span>
          <span class="font-mono-label text-xs">SSO ACCESS</span>
        </button>
        <button type="button" class="flex items-center justify-center gap-2 border border-white/10 rounded-lg py-3 hover:bg-white/5 transition-all">
          <span class="material-symbols-outlined text-on-surface text-lg">fingerprint</span>
          <span class="font-mono-label text-xs">BIOMETRIC</span>
        </button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <div class="mt-6 flex justify-between items-center px-4">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_8px_#3cddc7]"></span>
        <span class="font-mono-data text-mono-data text-outline">SYSTEM: ONLINE</span>
      </div>
      <span class="font-mono-data text-mono-data text-outline">v4.0.2-ALPHA</span>
    </div>
    <div class="flex gap-4">
      <a class="font-mono-label text-[10px] text-outline hover:text-on-surface" href="#">LEGAL</a>
      <a class="font-mono-label text-[10px] text-outline hover:text-on-surface" href="#">SUPPORT</a>
    </div>
  </div>
</main>

<!-- HUD corners -->
<div class="fixed top-8 left-8 pointer-events-none hidden xl:block">
  <div class="flex flex-col gap-2 opacity-30">
    <div class="h-px w-24 bg-primary/40"></div>
    <span class="font-mono-data text-[10px] text-primary">SCANNER_RANGE: 4000nm</span>
    <span class="font-mono-data text-[10px] text-primary">DEPTH_RATING: 11km</span>
  </div>
</div>
<div class="fixed bottom-8 right-8 pointer-events-none hidden xl:block">
  <div class="flex flex-col gap-2 opacity-30 items-end">
    <span class="font-mono-data text-[10px] text-tertiary">ENCRYPTION: AES-XTS 256</span>
    <span class="font-mono-data text-[10px] text-tertiary">STATUS: WAITING_AUTH</span>
    <div class="h-px w-24 bg-tertiary/40"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
